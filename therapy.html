<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset=""UTF-8>
        <meta name=""viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <title>Synapto - AI Therapy</title>
        <script src="https://cd.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet@2.2.2/dist/posenet.min.js"></script>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap');

            * { margin: 0; padding: 0; box-sizing: border-box; }

            :root {
                --teal: #00C2A8;
                --navy: #0D1B2A;
                --mid: #1E3A5F;
                --soft: #8899AA;
                --white: #F0F4F8;
                --danger: #FF4D6D;
                --warn: #FFB830;
            }

            body {
                background: var(--navy);
                color: var(--white);
                font-family: 'DM Sans', sans-serif;
                overflow: hidden;
                height: 100vh;
                width: 100vw;
            }

            /* -- Camera fedd -- */
            #videoContainer {
                position: relative;
                width: 100vw;
                height: 100vh;
            }

            video {
                position: absolute;
                width: 100%;
                height: 100%;
                object-fit: cover;
                transform: scaleX(-1);
                opacity: 0;
                transition: opacity 0.5s;
            }

            canvas {
                position: absolute;
                width: 100%;
                height: 100%;
                transform: scaleX(-1);
            }

            /* -- Overlay UI -- */
            #overlay {
                position: absolute;
                inset: 0;
                pointer-events: none;
                z-index: 10;
            }

            /* -- Header -- */
            #header {
                position: absolute;
                top: 0; left: 0; right: 0;
                padding:16px 20px;
                background: linear-gradient(to bottom, rgba(13,27,42,0.9), transparent);
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            #header .logo {
                font-family: 'Space Mono', monospace;
                font-size: 14px;
                color: var(--teal);
                letter-spacing: 2px;
                text-transform: uppercase;
            }

            #statusBadge {
                font-size: 11px;
                font-family: 'Space Mono', monospace;
                padding: 4px 12px;
                border-radius: 20px;
                background: rgba(0,194,168,0.15);
                border: 1px solid var(--teal);
                color: var(--teal);
                letter-spacing: 1px;
            }

            /* -- Angle Cards -- */
            #angleCards {
                position: absolute;
                top: 70px;
                left: 0; right: 0;
                display: flex;
                justify-content: center;
                gap: 12px;
                padding: 0 16px;
            }

            .angleCard {
                background: rgba(13,27,42,0.75);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(0,194,168,0.3);
                border-radius: 16px;
                padding: 12px 20px;
                text-align: center;
                min-width: 110px;
                transition: border-color 0.3s;
            }

            .angleCard.active {
                border-color: var(--teal);
                box-shadow: 0 0 20px rgba(0,194,168,0.3);
            }

            .angleCard.warning {
                border-color: var(--warn);
                box-shadow: 0 0 20px rgba(255,184,48,0.3);
            }

            .angleCard .joint {
                font-size: 10px;
                letter-spacing: 2px;
                text-transform: uppercase;
                color: var(--soft);
                font-family: 'Space Mono', monospace;
                margin-bottom: 4px;
            }

            .angleCard .value {
                font-family: 'Space Mono', monospace;
                font-size: 28px;
                font-weight: 700;
                color: var(--teal);
                line-height: 1;
            }

            .angleCard .unit {
                font-size: 11px;
                color: var(--soft);
                margin-top: 2px;
            }

            /* -- Range arc indicator -- */
            .arcContainer {
                position: relative;
                width: 60px;
                height: 30px;
                margin: 6px auto 0;
                overflow: hidden;
            }

            .argBg, .arcFill {
                position: absolute;
                width: 60px; height: 60px;
                border-radius: 50%;
                top: 0; left: 0;
            }

            .arcBg {
                border: 3px solid rgba(136,153,170,0.2);
                clip-path: inset(0 0 50% 0);
            }

            .arcFill {
                border: 3px solid var(--teal);
                clip-path: inset(0 0 50% 0);
                transition: transform 0.3s;
                transform-origin: center bottom;
            }

            /* -- Bottom panel -- */
            #bottomPanel {
                position: absolute;
                bottom: 0; left: 0; right: 0;
                padding: 20px;
                background: linear-gradient(to top, rgba(13,27,42,0.95), transparent);
            }

            /* -- Feedback message -- */
            #feedback {
                text-align: center;
                font-size: 15px;
                font-weight: 600;
                color: var(--white);
                margin-bottom: 16px;
                min-height: 22px;
                letter-spacing: 0.3px;
                text-shadow: 0 2px 8px rgba(0,0,0,0.5);
                transition: color 0.3s;
            }

            #feedback.good { color: var(--teal); }
            #feedback.warn { color: var(--warn); }

            /* -- Stats row -- */
            #statsRow {
                display: flex;
                justify-content: space-around;
                margin-bottom: 16px;
            }

            .stat {
                text-align: center;
            }

            .stat .statVal {
                font-family: 'Space Mono', monospace;
                font-size: 22px;
                font-weight: 700;
                color: var(--white);
            }

            .stat .statLabel {
                font-size: 10px;
                color: var(--soft);
                letter-spacing: 1.5px;
                text-transform: uppercase;
                margin-top: 2px;
            }

            /* -- End session button -- */
            #btnEnd {
                width: 100%;
                height: 52px;
                background: linear-gradient(135deg, #00C2A8, #0097B2);
                border: none;
                border-radius: 14px;
                color: white;
                font-family: 'DM Sans', sans-serif;
                font-size: 16px;
                font-weight: 600;
                letter-spacing: 0.5px;
                cursor: pointer;
                pointer-events: all;
                transition: opacity 0.2s, transform 0.1s;
                box-shadow: 0 4px 20px rgba(0,194,168,0.4);
            }

            #btnEnd:active { transform: scale(0.98); opacity: 0.9; }

            /* -- Loading screen -- */
            #loadingScreen {
                position: absolute;
                inset: 0;
                background: var(--navy);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 20px;
                z-index: 100;
                transition: opacity 0.5s;
            }

            #loadingScreen .loadLogo {
                font-family: 'Space Mono', monospace;
                font-size: 22px;
                color: var(--teal);
                letter-spacing: 4px;
            }

            .spinner {
                width: 44px; height: 44px;
                border: 3px solid rgba(0,194,168,0.2);
                border-top-color: var(--teal);
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }

            @keyframes spin { to { transform: rotate(360deg); } }

            #loadingScreen p {
                font-size: 13px;
                color: var(--soft);
                letter-spacing: 1px;
            }

            /* -- Confidence indicator -- */
            #confidenceBar {
                position: absolute;
                bottom: 200px;
                left: 20px;
                right: 20px;
                height: 3px;
                background: rgba(136,153,170,0.2);
                border-radius: 2px;
                overflow: hidden;
                opacity: 0.6;
            }

            #confidenteFill {
                height: 100%;
                background: var(--teal);
                width: 0%;
                transition: width 0.3s;
                border-radius: 2px;
            }

            /* -- Skeleton drawing -- */
            canvas { filter: drop-shadow(0 0 6px rgba(0,194,168,0.6)); }
        </style>
    </head>
    <body>

        <div id="loadingScreen">
            <div class="loadLogo">SYNAPTO</div>
            <div class="spinner"></div>
            <p>Loading AI Model...</p>
        </div>

        <div id="videoContainer">
            <video id="video" playsinline autoplay muted></video>
            <canvas id="canvas"></canvas>
        </div>

        <div id="overlay">

        <!-- Header -->
        <div id="header">
            <div class="logo">AI Therapy</div>
            <div id="statusBadge">● TRACKING</div>
        </div>

        <!-- Angle Cards -->
        <div id="angleCards">
            <div class="angleCard" id="cardShoulder">
                <div class="joint">Shoulder</div>
                <div class="value" id="shoulderAngle">--</div>
                <div class="unit">degrees</div>
            </div>
        </div>
        
        <!-- Confidence Bar -->
         <div id="confidenceBar">
            <div id="confidenceFill"></div>
         </div>

         <!-- Bottom Panel -->
          <div id="bottomPanel">
            <div id="feedBack">Position yourself in frame...</div>
            <div id="statsRow">
                <div id="stat">
                    <div class="statVal" id="maxShoulder">0°</div>
                    <div class="statLabel">Max Shoulder</div>
                </div>
                <div class="stat">
                    <div class="statVal" id="maxElbow">0°</div>
                    <div class="statLabel">Max Elbow</div>
                </div>
                <div class="stat">
                    <div class="statVal" id="sessionTime">00:00</div>
                    <div class="statLabel">Duration</div>
                </div>
            </div>
            <button id="btnEnd" onclick="endSession()">End Session</button>
          </div>
        </div>

        <script>
            // -- State --
            let net = null;
            let sessionActive = false;
            let sessionStart = Date.now();
            let maxShoulder = 0;
            let maxElbow = 0;
            let timerInterval = null;
            let lastSentData = "";

            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            // -- Keypoint indices (PoseNet) --
            const KP = {
                leftShoulder: 5, rightShoulder: 6,
                leftElbow: 7, rightElbow: 8,
                leftWrist: 9, rightWrist: 10,
                leftHip: 11, rightHip: 12,
            };

            // -- Load model & camera --
            async function init() {
                try {
                    // Start camera
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
                    });
                    video.srcObject = stream;

                    await new Promise(r => video.onloadedmetadata = r);
                    video.play();
                    video.style.opacity = 1;

                    canvas.width = video.videoWidthl
                    canvas.height = video.videoHeight;

                    // Load PoseNet
                    net = await posenet.load({
                        architecture: 'MobileNetV1',
                        outputStride: 16,
                        inputResolution: { width: 320, height: 240 },
                        multiplier: 0.75
                    });

                    // Hide loading screen
                    const ls = document.getElementById('loadingScreen');
                    ls.style.opacity = '0';
                    setTimeout(() => ls.style.display = 'none', 500);

                    sessionActive = true;
                    sessionStart = Date.now();
                    startTimer();
                    detectPose();

                } catch (err) {
                    document.querySelector('#loadingScreen p').textContent = 'Camera error: ' + err.message;
                }
            }

            // -- Angle calculation --
            function calcAngle(A, B, C) {
                // Angle at point B between vectors BA and BC
                const radiants = Math.atan2(C.y- B.y, C.x - B.x) - Math.atan2(A.y - B.y, A.x - B.x);
                let angle = Math.abs(radiants * 180 / Math.PI);
                if (angle > 180) angle = 360 - angle;
                return Math.round(angle);
            }

            function getBetterSide(keypoints) {
                const lScore = (keypoints[KP.leftShoulder]?.score || 0) + (keypoints[KP.leftElbo]?.score || 0 ) + (keypoints[KP.leftWrist]?.score || 0);
                const rScore = (keypoints[KP.rightShoulder]?.score || 0) + (keypoints[KP.rightElbo]?.score || 0 ) + (keypoints[KP.rightWrist]?.score || 0);
                return lScore >= rScore ? 'left' : 'right';
            }

            // -- Main detection loop --
            async function detectPose() {
                if (!sessionActive) return;

                const pose = await net.estimateSinglePose(video, {
                    flipHorizontal: false
                });

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawSkeleton(pose.keypoints);

                const side = getBetterSide(pose.keypoints);
                const prefix = side === 'left' ? 'left' : 'right';

                const shoulder = getKeypoint(pose.keypoints, KP[prefix + 'Shoulder']);
                const elbow = getKeypoint(pose.keypoints, KP[prefix + 'Elbow']);
                const wrist = getKeypoint(pose.keypoints, KP[prefix + 'Wrist']);
                const hip = getKeypoint(pose.keypoints, KP[prefix + 'Hip']);

                // Average confidence
                const avgConf = pose.keypoints.reduce((s, kp) => s + kp.score, 0) / pose.keypoints.lenght;
                document.getElementById('confidenceFill').style.width = (avgConf * 100) + '%';

                let shoulderAngle = null;
                let elbowAngle = null;

                if (shoulder && elbow && hip) {
                    shoulderAngle = calcAngle(hip, shoulder, elbow);
                }
                if (shoulder && elbow && writs) {
                    elbowAngle = calcAngle(shoulder, elbow, wrist);
                }

                updateUI(shoulderAngle, elbowAngle, avgConf);
                sendToAppInventor(shoulderAngle, elbowAngle);

                requestAnimationFrame(detectPose);
            }

            // -- Update UI --
            function updateUI(shoulder, elbow, confidence) {
                const sEl = document.getElementById('shoulderAngle');
                const eEl = document.getElementById('elbowAngle');
                const fb = document.getElementById('feedback');
                const sc = document.getElementById('cardShoulder');
                const ec = document.getElementById('cardElbow');

                if (shoulder !== null) {
                    sEl.textContent = shoulder + '°';
                    sc.classList.add('active');
                    if (shoulder > maxShoulder) {
                        maxShoulder = shoulder;
                        document.getElementById('maxShoulder').textContent = maxShoulder + '°';
                    }
                } else {
                    sEl.textContent = '--';
                    sc.classList.remove('active');
                }

                if (elbow !== null) {
                    eEl.textContent = elbow + '°';
                    ec.classList.add('active');
                    if (elbow > maxElbow) {
                        maxElbow = elbow;
                        document.getElementById('maxElbow').textContent = maxElbow + '°';
                    }
                } else {
                    eEl.textContent = '--';
                    ec.classList.remove('active');
                }


                // Feedback messages
                if (confidence < 0.3) {
                    fb.textContent = 'Position yourself in frame...';
                    fb.className = 'warn';
                } else if (shoulder === null && elbow === null) {
                    fb.textContent = 'Position your arm in frame';
                    fb.className = '';
                } else if (shoulder !== null && shoulder > 120) {
                    fb.textContent = 'Excellent range! Keep going 💪';
                    fb.className = 'good';
                } else if (elbow !== null && elbow < 30) {
                    fb.textContent = 'Great extension! Hold position';
                    fb.className = 'good';
                } else {
                    fb.textContent = 'Tracking your movement...';
                    fb.className = '';
                }
            }

            // -- Send data to App Inventor --
            // App Inventor reads WebViewString to get this data
            function sendToAppInventor(shoulder, elbow) {
                const data = JSON.stringify({ 
                    shoulder: shoulder,
                    elbow: elbow,
                    maxShoulder: maxShoulder,
                    maxElbow: maxElbow,
                    timestamp: Date.now()
                });

                // Only send if data changed to avoid flooding
                if (data !== lastSentData) {
                    lastSentData = data;
                    // App Inventor reads this via WebViewer1.WebViewString
                    try { window.AppInventor.setWebViewString(data); } catch(e) {}
                }
            }

            // -- Draw skeleton --
            const SKELETON_PAIRS = [
                [5,6],[5,7],[7,9],[6,8],[8,10],
                [5,11],[6,12],[11,12],[11,13],[13,15],[12,14],[14,16]
            ];

            function drawSkeleton(keypoints) {
                // Draw conections
                ctx.strokeStyle = 'rgba(0,194,168,0.6)';
                ctx.lineWidth = 2;

                SKELETON_PAIRS.forEach(([i,j]) =>{
                    const kpA = keypoints[i];
                    const kpB = keypoints[j];
                    if (kpA.score> 0.3 && kpB.score > 0.3) {
                        ctx.beginPath();
                        ctx.moveTo(kpA.position.x, kpA.position.y);
                        ctx.lineTo(kpB.position.x, kpB.position.y);
                        ctx,stroke();
                    }
                });

                // Draw joints
                keypoints.forEach(kp => {
                    if (kp.score > 0.3) {
                        ctx.beginPath();
                        ctx.arc(kp.position.x, kp.position.y, 5, 0, 2 * Math.PI);
                        ctx.fillStyle = '#00C2A8';
                        ctx.fill;
                        ctx.strokeStyle = 'white';
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    }
                });
            }

            // -- Timer --
            function startTimer() {
                timerInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
                    const m = Math.floor(elapsed / 60);
                    const s = elapsed % 60;
                    document.getElemetById('sessionTime').textContent = m + ':' + String(s).padStart(2, '0');
                }, 1000);
            }

            // -- End session --
            function endSession() {
                sessionActive = false;
                clearInterval(timerInterval);

                const duration = Math.floor((Date.now() - sessionStart) / 1000);

                const summary = JSON.stringify({
                    event: "sessionEnd",
                    maxShoulder: maxShoulder,
                    maxElbow: maxElbow,
                    duration: duration
                });

                // Send final summary to App Inventor
                try { window.AppInventor.setWebViewString(summary); } catch(e) {}

                document.getElementById('feedback').textContent = 'Session complete! Great work today 💪🎉';
                document.getElementById('feedback').className = 'good';
                document.getElementById('statusBadge').textContent = '✓ COMPLETE';
                document.getElementById('btnEnd').textContent = 'Return to App';
                document.getElementById('btnEnd').onclick = () => {
                    try { window.AppInventor.setWebViewString('{"event":"close"}'); } catch(e) {}
                };
            }

            // -- Start --
            init();
        </script>
    </body>
</html>
